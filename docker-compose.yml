# version: '3.9'

services:

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: clips-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword}
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    networks:
      - clips-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO (S3-compatible Object Storage)
  minio:
    image: quay.io/minio/minio:latest
    container_name: clips-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    expose:
      - "9000"
      - "9001"
    volumes:
      - minio-data:/data
    networks:
      - clips-network
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:9000/minio/health/live
      interval: 10s
      timeout: 5s
      retries: 10

  # MinIO Initialization (create buckets)
  minio-init:
    image: minio/mc:latest
    container_name: clips-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command: >
      -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/media;
      mc mb --ignore-existing local/videos;
      mc mb --ignore-existing local/avatars;
      mc ls local;
      "
    networks:
      - clips-network
    restart: "no"

  # Express Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: clips-backend
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      # Node Environment
      NODE_ENV: ${NODE_ENV:-development}
      
      # Database (MongoDB Atlas - set MONGO_URI in your .env file)
      MONGO_URI: ${MONGO_URI}
      
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispassword}@redis:6379
      
      # MinIO/S3
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-videos}
      AWS_S3_REGION: ${AWS_S3_REGION:-us-east-1}
      AWS_S3_ENDPOINT: http://minio:9000
      
      # Server
      PORT: 5000
      HOST: 0.0.0.0
      
      # CORS
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000,http://localhost}
      
      # JWT
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-this}
      JWT_EXPIRE: ${JWT_EXPIRE:-7d}
      
      # Email Service
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      EMAIL_SERVICE: ${EMAIL_SERVICE:-gmail}
      
      # Stripe
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    
    expose:
      - "5000"
    
    volumes:
      - ./backend:/app
      - /app/node_modules
    
    networks:
      - clips-network
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Dedicated Background Worker
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: clips-worker
    restart: unless-stopped
    command: npm run worker
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      # Node Environment
      NODE_ENV: ${NODE_ENV:-development}
      
      # Database (MongoDB Atlas - set MONGO_URI in your .env file)
      MONGO_URI: ${MONGO_URI}
      
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispassword}@redis:6379
      
      # MinIO/S3
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-videos}
      AWS_S3_REGION: ${AWS_S3_REGION:-us-east-1}
      AWS_S3_ENDPOINT: http://minio:9000
      
      # Email Service
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      EMAIL_SERVICE: ${EMAIL_SERVICE:-gmail}
    
    volumes:
      - ./backend:/app
      - /app/node_modules
    
    networks:
      - clips-network

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend/clips
      dockerfile: Dockerfile
      target: development
    container_name: clips-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      # Next.js Environment
      NODE_ENV: ${NODE_ENV:-development}
      
      # API Configuration
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
      INTERNAL_API_URL: http://backend:5000
    
    expose:
      - "3000"
    
    volumes:
      - ./frontend/clips:/app
      - /app/node_modules
      - /app/.next
    
    networks:
      - clips-network
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: clips-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
      - minio
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # SSL certificates (generate with: .\generate-certs.ps1)
      - ./ssl:/etc/nginx/ssl:ro
      # Static asset offloading — Nginx serves these directly from disk
      - ./frontend/clips/public:/static/public:ro
      - ./frontend/clips/.next/static:/static/next:ro
      - nginx-cache:/var/cache/nginx/static
    networks:
      - clips-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--no-check-certificate", "--spider", "https://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  redis-data:
    driver: local
  minio-data:
    driver: local
  nginx-cache:
    driver: local

networks:
  clips-network:
    driver: bridge
