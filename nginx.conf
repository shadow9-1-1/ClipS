upstream frontend {
    server frontend:3000;
    keepalive 32;
}

upstream backend {
    server backend:5000;
    keepalive 32;
}

upstream minio {
    server minio:9000;
    keepalive 32;
}

upstream minio_console {
    server minio:9001;
    keepalive 16;
}

# ─── Cache zones ──────────────────────────────────────────────────────────────
proxy_cache_path /var/cache/nginx/static
    levels=1:2
    keys_zone=static_cache:10m
    max_size=512m
    inactive=1d
    use_temp_path=off;

# ─── HTTP → HTTPS Redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name localhost;

    # Docker's embedded DNS — re-resolve upstreams every 5 s so stale IPs
    # after container rebuilds never cause 502s again.
    resolver 127.0.0.11 valid=5s ipv6=off;

    # Allow ACME challenge for future Let's Encrypt support
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS Main Server ────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name localhost;

    # Docker's embedded DNS — re-resolve upstreams every 5 s
    resolver 127.0.0.11 valid=5s ipv6=off;

    # ─── SSL Configuration ────────────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Modern SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS — uncomment after verifying HTTPS works
    # add_header Strict-Transport-Security "max-age=63072000" always;

    # Increase max upload size for video files
    client_max_body_size 500M;
    client_body_timeout 300s;

    # ─── Compression ─────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # ─── Next.js Immutable Static Chunks (/_next/static/) ────────────
    location /_next/static/ {
        alias /static/next/;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
        gzip_static on;
        try_files $uri @frontend_proxy;
    }

    # ─── Public Static Assets ─────────────────────────────────────────
    location /public/ {
        alias /static/public/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        add_header Vary "Accept-Encoding";
        access_log off;
        try_files $uri @frontend_proxy;
    }

    # ─── Root-level public files (favicon, robots, etc.) ─────────────
    location ~ ^/(favicon\.ico|robots\.txt|sitemap\.xml|manifest\.json|\.well-known/)(.*)$ {
        root /static/public;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
        try_files $uri @frontend_proxy;
    }

    # ─── Next.js Frontend ────────────────────────────────────────────
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ─── Named proxy fallback ─────────────────────────────────────────
    location @frontend_proxy {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Video Streaming (byte-range proxy) ──────────────────────────
    # Must come BEFORE the generic /api/ block (longest-prefix match wins)
    location /api/v1/storage/access {
        proxy_pass http://backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Pass byte-range headers through so backend can honour partial requests
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;

        # Stream bytes to client as they arrive — never buffer the whole video
        proxy_buffering off;
        proxy_request_buffering off;

        proxy_read_timeout 600s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 600s;
    }

    # ─── Express API ─────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
    }

    # ─── Socket.IO ───────────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
    }

    # ─── MinIO Object Storage ─────────────────────────────────────────
    location /storage/ {
        rewrite ^/storage/(.*)$ /$1 break;
        proxy_pass http://minio;
        proxy_http_version 1.1;

        proxy_set_header Host minio:9000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # ─── MinIO Console ────────────────────────────────────────────────
    location /minio-console/ {
        rewrite ^/minio-console/(.*)$ /$1 break;
        proxy_pass http://minio_console;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
