upstream frontend {
    server frontend:3000;
    keepalive 32;
}

upstream backend {
    server backend:5000;
    keepalive 32;
}

upstream minio {
    server minio:9000;
    keepalive 32;
}

upstream minio_console {
    server minio:9001;
    keepalive 16;
}

# ─── Cache zones ──────────────────────────────────────────────────────────────
proxy_cache_path /var/cache/nginx/static
    levels=1:2
    keys_zone=static_cache:10m
    max_size=512m
    inactive=1d
    use_temp_path=off;

server {
    listen 80;
    server_name localhost;

    # Increase max upload size for video files
    client_max_body_size 500M;
    client_body_timeout 300s;

    # ─── Compression ─────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # ─── Next.js Immutable Static Chunks (/_next/static/) ────────────
    # These hashed filenames never change — cache forever (1 year)
    location /_next/static/ {
        alias /static/next/;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;

        # Serve pre-compressed files if available
        gzip_static on;

        # Fall back to Next.js if file not found on disk
        try_files $uri @frontend_proxy;
    }

    # ─── Public Static Assets (/images/, /fonts/, /icons/, etc.) ─────
    # Mounted from frontend/clips/public — cache for 7 days
    location /public/ {
        alias /static/public/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        add_header Vary "Accept-Encoding";
        access_log off;
        try_files $uri @frontend_proxy;
    }

    # ─── Root-level public files (favicon, robots, etc.) ─────────────
    location ~ ^/(favicon\.ico|robots\.txt|sitemap\.xml|manifest\.json|\.well-known/)(.*)$ {
        root /static/public;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
        try_files $uri @frontend_proxy;
    }

    # ─── Next.js Frontend (proxy fallback) ───────────────────────────
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;

        # WebSocket support (Next.js HMR in dev)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ─── Named proxy fallback for static try_files misses ────────────
    location @frontend_proxy {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Express API ─────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Longer timeouts for video upload/processing endpoints
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
    }

    # ─── Socket.IO (WebSockets) ───────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
    }

    # ─── MinIO Object Storage (S3 API) ────────────────────────────────
    location /storage/ {
        rewrite ^/storage/(.*)$ /$1 break;
        proxy_pass http://minio;
        proxy_http_version 1.1;

        proxy_set_header Host minio:9000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for MinIO large uploads
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # ─── MinIO Console (Admin UI) ─────────────────────────────────────
    location /minio-console/ {
        rewrite ^/minio-console/(.*)$ /$1 break;
        proxy_pass http://minio_console;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
